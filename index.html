<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hot Dog Builder</title>
    <style>
      :root {
        --bg: #1f1f2e;
        --panel: #2b2c44;
        --text: #f7f7fb;
        --muted: #b6b8d1;
        --accent: #ffb400;
        --danger: #ff5f6d;
        --success: #5eead4;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #2b2c44 0%, #181823 65%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .game-shell {
        width: min(980px, 100%);
        background: rgba(18, 19, 37, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 32px 80px rgba(0, 0, 0, 0.32);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3.2rem);
        letter-spacing: -0.03em;
      }

      p.subtitle {
        margin: 0 0 24px;
        color: var(--muted);
        max-width: 40rem;
        line-height: 1.6;
      }

      .layout {
        display: grid;
        gap: 24px;
        grid-template-columns: 1.25fr 1fr;
      }

      .panel {
        background: var(--panel);
        border-radius: 20px;
        padding: 24px;
      }

      .panel h2 {
        margin-top: 0;
        font-size: 1.2rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--accent);
      }

      .ingredients {
        display: grid;
        gap: 12px;
        margin: 16px 0 0;
      }

      .ingredient-btn {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        padding: 14px 16px;
        font-size: 0.98rem;
        cursor: pointer;
        text-align: left;
        transition:
          transform 0.15s ease,
          background 0.15s ease,
          border-color 0.15s ease;
      }

      .ingredient-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
      }

      .ingredient-btn span {
        display: inline-block;
        margin-right: 10px;
        width: 12px;
        height: 12px;
        border-radius: 999px;
        vertical-align: middle;
      }

      .ingredient-btn[data-ingredient="bun-bottom"] span,
      .ingredient-btn[data-ingredient="bun-top"] span {
        background: #d39b58;
      }
      .ingredient-btn[data-ingredient="sausage"] span {
        background: #b45a2f;
      }
      .ingredient-btn[data-ingredient="bacon"] span {
        background: #8b4513;
      }
      .ingredient-btn[data-ingredient="mustard"] span {
        background: #f0c419;
      }
      .ingredient-btn[data-ingredient="ketchup"] span {
        background: #e63e4e;
      }
      .ingredient-btn[data-ingredient="onions"] span {
        background: #d0c9d8;
      }
      .ingredient-btn[data-ingredient="relish"] span {
        background: #6bbf50;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .action-btn {
        border: none;
        border-radius: 14px;
        padding: 14px 18px;
        background: var(--accent);
        color: #111;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          filter 0.15s ease;
      }

      .action-btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
      }

      .action-btn.secondary {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .status {
        margin-top: 16px;
        color: var(--muted);
        line-height: 1.6;
      }

      .status strong {
        color: var(--text);
      }

      .counter {
        display: inline-flex;
        gap: 10px;
        align-items: center;
        margin-top: 12px;
        font-size: 0.95rem;
        color: var(--text);
      }

      .counter .badge {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        padding: 6px 12px;
        color: var(--success);
      }

      .build-area {
        display: grid;
        gap: 16px;
      }

      .hotdog-card {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.04),
          rgba(255, 255, 255, 0.08)
        );
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 24px;
        border-radius: 24px;
        min-height: 420px;
      }

      .stack-area {
        min-height: 300px;
        border: 2px dashed rgba(255, 255, 255, 0.12);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.02);
        padding: 18px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        flex-direction: column-reverse;
        overflow: hidden;
        position: relative;
      }

      .stack-area::before {
        content: "Drop ingredients here by clicking buttons";
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.35);
        font-size: 0.95rem;
        text-align: center;
        pointer-events: none;
      }

      .layer {
        width: min(260px, 100%);
        margin: 0 auto 8px;
        border-radius: 999px;
        padding: 14px 8px;
        box-shadow: inset 0 -2px 8px rgba(0, 0, 0, 0.18);
        text-align: center;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #111;
        position: relative;
      }

      .layer--bun {
        background: #d39b58;
        color: #3f2100;
      }
      .layer--sausage {
        background: #b45a2f;
      }
      .layer--mustard {
        background: #f4c43f;
        color: #2f1f00;
      }
      .layer--ketchup {
        background: #e64554;
      }
      .layer--onions {
        background: #e6e0e9;
        color: #2b2732;
      }
      .layer--relish {
        background: #80c257;
        color: #12210a;
      }

      .layer::before {
        content: "";
        position: absolute;
        left: 8%;
        right: 8%;
        top: 0;
        height: 8px;
        border-radius: 999px;
        opacity: 0.25;
        background: rgba(0, 0, 0, 0.08);
      }

      .instructions {
        color: var(--muted);
        margin: 0;
        line-height: 1.7;
      }

      @media (max-width: 760px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="game-shell">
      <h1>Build a Hot Dog</h1>
      <p class="subtitle">
        u got this make a good hot dog. Add what ever topings you would like.
      </p>

      <div class="layout">
        <section class="panel">
          <h2>Ingredients</h2>
          <div class="ingredients" id="ingredients"></div>
          <div class="controls">
            <button class="action-btn" id="scoreBtn">Score it</button>
            <button class="action-btn secondary" id="resetBtn">Reset</button>
            <button class="action-btn secondary" id="undoBtn">remove last ingredient</button>
          </div>
          <div class="status" id="status">
            your glizzy is waiting to be built zawg.
          </div>
          <div class="counter">
            Built: <span class="badge" id="score">0</span>
          </div>
        </section>

        <section class="build-area">
          <div class="hotdog-card">
            <h2 style="margin-top: 0; color: #fff">Hot Dog Stack</h2>
            <div class="stack-area" id="stackArea"></div>
            <p class="instructions">
              Start with a bun bottom, add sausage and toppings, then finish
              with a bun top.
            </p>
          </div>
        </section>
      </div>
    </main>

    <script>
      const ingredients = [
        {
          id: "bun-bottom",
          label: "Bun Bottom",
          class: "bun",
          role: "bun-bottom",
        },
        { id: "sausage", label: "Sausage", class: "sausage", role: "sausage" },
        {
          id: "mustard",
          label: "Mustard",
          class: "mustard",
          role: "condiment",
        },
        {
          id: "ketchup",
          label: "Ketchup",
          class: "ketchup",
          role: "condiment",
        },
        { id: "onions", label: "Onions", class: "onions", role: "condiment" },
        { id: "relish", label: "Relish", class: "relish", role: "condiment" },
        { id: "bun-top", label: "Bun Top", class: "bun", role: "bun-top" },
      
      {id: "bacon", label: "Bacon", class: "sausage", role: "sausage"}

      ];

      const stack = [];
      const stackArea = document.getElementById("stackArea");
      const status = document.getElementById("status");
      const scoreEl = document.getElementById("score");
      const scoreBtn = document.getElementById("scoreBtn");
      const resetBtn = document.getElementById("resetBtn");
      const undoBtn = document.getElementById("undoBtn");
      const ingredientsPanel = document.getElementById("ingredients");

      let successfulBuilds = 0;

      function renderIngredients() {
        ingredientsPanel.innerHTML = "";
        for (const ingredient of ingredients) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "ingredient-btn";
          button.dataset.ingredient = ingredient.id;
          button.innerHTML = `<span></span>${ingredient.label}`;
          button.addEventListener("click", () => addIngredient(ingredient));
          ingredientsPanel.appendChild(button);
        }
      }

      function renderStack() {
        stackArea.innerHTML = "";
        if (!stack.length) {
          stackArea.innerHTML =
            '<div style="color:rgba(255,255,255,0.35); text-align:center; width:100%;">No ingredients yet</div>';
          return;
        }
        const reversed = [...stack].reverse();
        for (const entry of reversed) {
          const layer = document.createElement("div");
          layer.className = `layer layer--${entry.class}`;
          layer.textContent = entry.label;
          stackArea.appendChild(layer);
        }
      }

      function updateStatus(text, success = false) {
        status.textContent = text;
        status.style.color = success ? "var(--success)" : "var(--muted)";
      }

      function addIngredient(ingredient) {
        stack.push(ingredient);
        renderStack();
        updateStatus(`Added ${ingredient.label}.`);
      }

      function undoIngredient() {
        if (!stack.length) {
          updateStatus("There is nothing to undo.");
          return;
        }
        const removed = stack.pop();
        renderStack();
        updateStatus(`Removed ${removed.label}.`);
      }

      function resetStack() {
        stack.length = 0;
        renderStack();
        updateStatus("Start again and build your best hot dog.");
      }

      function isValidHotDog() {
        if (stack.length < 3) return false;
        const bottom = stack[0]?.id;
        const top = stack[stack.length - 1]?.id;
        const hasSausage = stack.some((item) => item.id === "sausage");
        return bottom === "bun-bottom" && top === "bun-top" && hasSausage;
      }

      function scoreHotDog() {
        if (!stack.length) {
          updateStatus("Add ingredients before scoring the hot dog.");
          return;
        }
        const valid = isValidHotDog();
        if (valid) {
          successfulBuilds += 1;
          scoreEl.textContent = successfulBuilds;
          updateStatus(
            "Perfect! Your hot dog is complete and delicious.",
            true,
          );
        } else {
          updateStatus(
            "Almost there! A valid hot dog needs a bottom bun, sausage, and top bun.",
            false,
          );
        }
      }

      scoreBtn.addEventListener("click", scoreHotDog);
      resetBtn.addEventListener("click", resetStack);
      undoBtn.addEventListener("click", undoIngredient);

      renderIngredients();
      renderStack();
    </script>
  </body>
</html>
